<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Cities for Startups</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    padding: 40px 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    min-height: 100vh;
  }
  .page-header {
    text-align: center;
    max-width: 800px;
    margin: 0 auto 48px;
  }
  .page-title {
    font-size: 42px;
    font-weight: 700;
    color: white;
    line-height: 1.2;
  }
  .city-list {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .city-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #050a3a;
    border-radius: 12px;
    padding: 16px 24px;
    border: 1px solid rgba(255, 55, 122, 0.08);
    transition: all 0.3s ease;
    cursor: pointer;
    text-decoration: none;
  }
  .city-item:hover {
    border-color: rgba(255, 55, 122, 0.25);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 55, 122, 0.05);
  }
  .city-info {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .city-rank {
    font-size: 13px;
    font-weight: 800;
    color: #ff377a;
    background: rgba(255, 55, 122, 0.1);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255, 55, 122, 0.25);
    min-width: 44px;
    text-align: center;
  }
  .city-name {
    font-size: 18px;
    font-weight: 700;
    color: white;
    line-height: 1.2;
  }
  .view-card-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(255, 55, 122, 0.08);
    border: 1px solid rgba(255, 55, 122, 0.2);
    color: #ff377a;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 8px 20px;
    border-radius: 24px;
    text-decoration: none;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .city-item:hover .view-card-btn {
    background: rgba(255, 55, 122, 0.15);
    border-color: #ff377a;
    color: white;
    box-shadow: 0 4px 12px rgba(255, 55, 122, 0.15);
  }
  .view-card-btn svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    stroke-width: 2;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  @media (max-width: 768px) {
    body { padding: 24px 12px; }
    .page-title { font-size: 28px; }
    .city-item { padding: 14px 16px; }
    .city-info { gap: 14px; }
    .city-name { font-size: 16px; }
    .view-card-btn { font-size: 11px; padding: 7px 16px; }
  }
  @media (max-width: 480px) {
    body { padding: 16px 8px; }
    .page-title { font-size: 24px; }
    .page-header { margin: 0 auto 32px; }
    .city-list { gap: 8px; }
    .city-item { padding: 12px 14px; }
    .city-info { gap: 10px; }
    .city-name { font-size: 15px; }
    .city-rank { font-size: 11px; padding: 3px 10px; min-width: 38px; }
    .view-card-btn { font-size: 11px; padding: 6px 14px; }
  }
</style>
</head>
<body>
<div class="page-header">
  <h1 class="page-title">Best Cities for Startups</h1>
</div>
<div class="city-list" id="cityList"></div>
<script>
const BASE_URL = 'https://robertmak.github.io/Startups_NE_Large';
const cities = [
  { rank: 1, city: "Providence", stateCode: "RI", slug: "providence-ri" },
  { rank: 2, city: "Pittsburgh", stateCode: "PA", slug: "pittsburgh-pa" },
  { rank: 3, city: "Brooklyn", stateCode: "NY", slug: "brooklyn-ny" },
  { rank: 4, city: "Rochester", stateCode: "NY", slug: "rochester-ny" },
  { rank: 5, city: "Manhattan", stateCode: "NY", slug: "manhattan-ny" },
  { rank: 6, city: "Queens", stateCode: "NY", slug: "queens-ny" },
  { rank: 7, city: "Worcester", stateCode: "MA", slug: "worcester-ma" },
  { rank: 8, city: "Bridgeport", stateCode: "CT", slug: "bridgeport-ct" },
  { rank: 9, city: "Buffalo", stateCode: "NY", slug: "buffalo-ny" },
  { rank: 10, city: "Boston", stateCode: "MA", slug: "boston-ma" },
  { rank: 11, city: "Jersey City", stateCode: "NJ", slug: "jersey-city-nj" },
  { rank: 12, city: "Newark", stateCode: "NJ", slug: "newark-nj" },
  { rank: 13, city: "Philadelphia", stateCode: "PA", slug: "philadelphia-pa" },
  { rank: 14, city: "Springfield", stateCode: "MA", slug: "springfield-ma" },
  { rank: 15, city: "Bronx", stateCode: "NY", slug: "bronx-ny" }
];
function buildList() {
  const list = document.getElementById('cityList');
  list.innerHTML = cities.map(city => {
    const cardUrl = `${BASE_URL}/card.html?city=${city.slug}`;
    return `
      <a href="${cardUrl}" class="city-item">
        <div class="city-info">
          <span class="city-rank">#${city.rank}</span>
          <span class="city-name">${city.city}, ${city.stateCode}</span>
        </div>
        <span class="view-card-btn">
          View Card
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </span>
      </a>
    `;
  }).join('');
}
buildList();
</script>
</body>
</html>
